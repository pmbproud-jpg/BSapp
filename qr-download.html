<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSapp - Pobierz aplikację</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo { font-size: 48px; margin-bottom: 8px; }
    h1 { font-size: 28px; color: #1e293b; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #64748b; margin-bottom: 32px; }
    .qr-container {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      padding: 24px;
      display: inline-block;
      margin-bottom: 24px;
    }
    .qr-container img { display: block; }
    .instruction {
      font-size: 15px;
      color: #475569;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: #1d4ed8; }
    .version { font-size: 11px; color: #94a3b8; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📱</div>
    <h1>BSapp</h1>
    <p class="subtitle">Baustellenmanagement</p>

    <div class="qr-container">
      <img
        src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https%3A%2F%2Fexpo.dev%2Fartifacts%2Feas%2Fd1QzB6KQBmoFC7NJ79G8Zt.apk"
        alt="QR Code"
        width="250"
        height="250"
      />
    </div>

    <p class="instruction">
      Zeskanuj kod QR telefonem<br>
      aby pobrać aplikację BSapp
    </p>

    <a class="btn" href="https://expo.dev/artifacts/eas/d1QzB6KQBmoFC7NJ79G8Zt.apk" target="_blank">
      Pobierz APK
    </a>

    <p class="version">Wersja 1.0.0 • Build 19.02.2026 • Android</p>
  </div>
</body>
</html>
